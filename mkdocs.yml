site_name: ipybox
site_description: ipybox
site_url: https://gradion-ai.github.io/ipybox/

repo_name: gradion-ai/ipybox
repo_url: https://github.com/gradion-ai/ipybox

copyright: Copyright &copy; 2025-2026 Gradion AI

theme:
  name: material
  logo: images/logo.png
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    scheme: slate
    primary: custom
    accent: custom
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.preview
    - navigation.instant.progress
    - navigation.top
    - navigation.tracking
    - search.suggest
    - toc.follow
    - content.code.copy
    - content.code.select
    - content.code.annotate

plugins:
  - search
  - llmstxt:
      markdown_description: |
        Unified execution environment for Python code, shell commands, and programmatic MCP tool calls.

        ipybox executes code blocks in a stateful IPython kernel. A code block can contain any
        combination of Python code, shell commands, and programmatic MCP tool calls. Kernels can be
        sandboxed with sandbox-runtime, enforcing filesystem and network restrictions at OS level.

        It generates Python APIs for MCP server tools via mcpygen, and supports application-level
        approval of individual tool calls and shell commands during code execution. ipybox runs
        locally on your computer, enabling protected access to your local data and tools.
      full_output: llms-full.txt
      sections:
        Documentation:
          - index.md: Project overview and capabilities
          - installation.md: Installation and setup instructions
          - quickstart.md: Getting started guide
          - architecture.md: Architecture overview
          - apigen.md: Generating typed Python API from MCP server schemas
          - codeexec.md: Code and shell command execution in IPython kernels
          - sandbox.md: Lightweight sandboxing with Anthropic's sandbox-runtime
          - mcpserver.md: Using ipybox as an MCP server
          - ccplugin.md: a plugin for programmatic tool calling in Claude Code
        API Reference:
          - api/code_executor.md: CodeExecutor high-level API
          - api/kernel_manager.md: KernelGateway and KernelClient low-level API
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [ipybox]
          options:
            show_root_heading: true
            show_source: false
            show_signature_annotations: true
            signature_crossrefs: true
            separate_signature: true
            merge_init_into_class: true
            extensions:
              - griffe_pydantic
          inventories:
            - url: https://docs.python.org/3/objects.inv
              domains: [py, std]
  - redirects:
      redirect_maps:
        'mcp-client.md': 'apigen.md'
        'mcp-server.md': 'mcpserver.md'
        'docker.md': 'mcpserver.md#docker'


markdown_extensions:
  - footnotes
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      dedent_subsections: true
  - pymdownx.superfences
  - pymdownx.details
  - attr_list
  - md_in_html
  - admonition
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra_css:
  - stylesheets/extra.css

nav:
  - Documentation:
    - Overview: index.md
    - Installation: installation.md
    - Quickstart: quickstart.md
    - Architecture: architecture.md
    - API generation: apigen.md
    - Code execution: codeexec.md
    - Sandboxing: sandbox.md
    - Agent Integration:
      - ipybox MCP Server: mcpserver.md
      - Claude Code plugin: ccplugin.md
    - LLM readable:
      - llms.txt: llms.txt
      - llms-full.txt: llms-full.txt
  - API Reference:
    - High-level API:
      - Code Executor: api/code_executor.md
    - Low-level API:
      - Kernel Manager: api/kernel_manager.md
